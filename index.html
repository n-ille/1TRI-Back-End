<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">

</head>
<body>
    <h1>Cadastro de clientes</h1>
    <form>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" placeholder="Digite seu nome aqui" required>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="priquitosempena@gmail.com" required>
        <label for="celular">Celular:</label>
        <input type="tel" id="celular" placeholder="(42) 91234-5678" required>
        <label for="cpf">Cpf:</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" required>
        <label for="cep">CEP:</label>
        <input type="text" id="cep" placeholder="00000-000" required>
        <label for="rua">Rua:</label>
        <input type="text" id="rua" placeholder="Rua Priquito Sem Pena" required>
        <label for="número">Número:</label>
        <input type="text" id="numero" placeholder="769" required>
        <label for="bairro">Bairro:</label>
        <input type="text" id="bairro" placeholder="Bairro Priquito Com Pena" required>
        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" placeholder="Priquito Com Pena Grossa" required>
        <label for="uf">UF:</label>
        <input type="text" id="uf" placeholder="Priquito Com Pena Fina" required>
        <label for="senha">Senha:</label>
        <input type="text" id="senha" placeholder="priquitosempena123" required>

        <input type="submit" value="Enviar Cadastro">
        </form>
</body>
</html>
